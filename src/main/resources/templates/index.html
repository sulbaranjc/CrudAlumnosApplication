<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumno App</title>
    <!-- Bootstrap 5 (latest) CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <!-- Estilos propios de la vista index -->
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <!-- Bootstrap Icons via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <!-- Brand -->
            <a class="navbar-brand fw-bold" href="#">Alumno App</a>

            <!-- Toggler para móviles -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarMain"
                    aria-controls="navbarMain" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Opción 1</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Opción 2</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Opción 3</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header class="bg-primary text-white py-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Alumno App</h1>
            <p class="lead">Gestión de alumnos y sus calificaciones</p>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container mt-5 flex-grow-1">

        <!-- Encabezado de sección: título a la izquierda, botón a la derecha -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Listado de Alumnos</h2>
            <a href="/alumnos/nuevo" class="btn btn-primary rounded-circle d-inline-flex align-items-center justify-content-center btn-circle" title="Agregar Alumno">
                <i class="bi bi-plus-lg"></i>
            </a>
        </div>

        <!-- Tabla centrada -->
        <table class="table table-bordered table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Nota 1</th>
                    <th>Nota 2</th>
                    <th>Nota 3</th>
                    <th>Nota Final</th>
                    <th>Promedio Final</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="alumno : ${alumnos}">
                    <td th:text="${alumno.nombre}"></td>
                    <td th:text="${alumno.nota1}"></td>
                    <td th:text="${alumno.nota2}"></td>
                    <td th:text="${alumno.nota3}"></td>
                    <td th:text="${alumno.notaFinal}"></td>
                    <td th:text="${alumno.promedioFinal}"></td>
                    <td>
                        <a th:href="@{/alumnos/editar/{id}(id=${alumno.id})}" class="btn btn-warning btn-sm" title="Editar">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                        <a th:href="@{/alumnos/eliminar/{id}(id=${alumno.id})}" class="btn btn-danger btn-sm" title="Eliminar">
                            <i class="bi bi-trash3"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white d-flex align-items-center justify-content-center">
        <p class="mb-0">&copy; 2026 By sulbaranjc</p>
    </footer>

    <!-- Bootstrap 5 (latest) JS Bundle via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmkkxQ7k54xCgQiBO99UQBXPgqiU"
            crossorigin="anonymous"></script>
</body>
</html>
