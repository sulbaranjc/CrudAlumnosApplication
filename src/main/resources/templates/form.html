<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${alumno.id == 0} ? 'Agregar Alumno' : 'Editar Alumno'">Formulario Alumno</title>
    <!-- Bootstrap 5 (latest) CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <!-- Estilos propios de la vista form -->
    <link rel="stylesheet" th:href="@{/css/form.css}">
    <!-- Bootstrap Icons via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/alumnos">Alumno App</a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarMain"
                    aria-controls="navbarMain" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="#">Opción 1</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Opción 2</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Opción 3</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header class="bg-primary text-white py-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Alumno App</h1>
            <p class="lead">Gestión de alumnos y sus calificaciones</p>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container mt-5 flex-grow-1">

        <div class="form-card">
            <!-- Encabezado de sección -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0" th:text="${alumno.id == 0} ? 'Agregar Alumno' : 'Editar Alumno'"></h2>
                <a href="/alumnos" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Volver
                </a>
            </div>

            <!-- Formulario -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="${alumno.id == 0} ? @{/alumnos/guardar} : @{/alumnos/actualizar}"
                          th:object="${alumno}" method="post">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-semibold">Nombre</label>
                            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required/>
                        </div>
                        <div class="mb-3">
                            <label for="nota1" class="form-label fw-semibold">Nota 1</label>
                            <input type="number" step="0.01" class="form-control" id="nota1" th:field="*{nota1}" required/>
                        </div>
                        <div class="mb-3">
                            <label for="nota2" class="form-label fw-semibold">Nota 2</label>
                            <input type="number" step="0.01" class="form-control" id="nota2" th:field="*{nota2}" required/>
                        </div>
                        <div class="mb-3">
                            <label for="nota3" class="form-label fw-semibold">Nota 3</label>
                            <input type="number" step="0.01" class="form-control" id="nota3" th:field="*{nota3}" required/>
                        </div>
                        <div class="mb-4">
                            <label for="notaFinal" class="form-label fw-semibold">Nota Final</label>
                            <input type="number" step="0.01" class="form-control" id="notaFinal" th:field="*{notaFinal}" required/>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-floppy me-1"></i> Guardar
                            </button>
                            <a href="/alumnos" class="btn btn-secondary">
                                <i class="bi bi-x-circle me-1"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white d-flex align-items-center justify-content-center">
        <p class="mb-0">&copy; 2026 By sulbaranjc</p>
    </footer>

    <!-- Bootstrap 5 (latest) JS Bundle via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmkkxQ7k54xCgQiBO99UQBXPgqiU"
            crossorigin="anonymous"></script>
</body>
</html>
